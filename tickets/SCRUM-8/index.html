<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord d'analyse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #2f2f3f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            color: #66d9ef;
        }
        .charts {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .chart {
            width: 45%;
            margin: 20px;
            padding: 20px;
            background-color: #3f3f4f;
            border-radius: 10px;
        }
        .chart h2 {
            font-size: 18px;
            font-weight: bold;
            color: #66d9ef;
            margin-bottom: 10px;
        }
        .chart canvas {
            width: 100%;
            height: 200px;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-top: 20px;
        }
        .stat {
            width: 20%;
            margin: 20px;
            padding: 20px;
            background-color: #3f3f4f;
            border-radius: 10px;
        }
        .stat h2 {
            font-size: 18px;
            font-weight: bold;
            color: #66d9ef;
            margin-bottom: 10px;
        }
        .stat p {
            font-size: 16px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tableau de bord d'analyse</h1>
        </div>
        <div class="charts">
            <div class="chart">
                <h2>Graphique 1</h2>
                <canvas id="chart1"></canvas>
            </div>
            <div class="chart">
                <h2>Graphique 2</h2>
                <canvas id="chart2"></canvas>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <h2>Statistique 1</h2>
                <p>100</p>
            </div>
            <div class="stat">
                <h2>Statistique 2</h2>
                <p>200</p>
            </div>
            <div class="stat">
                <h2>Statistique 3</h2>
                <p>300</p>
            </div>
            <div class="stat">
                <h2>Statistique 4</h2>
                <p>400</p>
            </div>
        </div>
    </div>
    <script>
        const chart1 = document.getElementById('chart1').getContext('2d');
        const chart2 = document.getElementById('chart2').getContext('2d');
        new Chart(chart1, {
            type: 'bar',
            data: {
                labels: ['Janvier', 'Février', 'Mars', 'Avril', 'Mai'],
                datasets: [{
                    label: 'Données',
                    data: [10, 20, 30, 40, 50],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        new Chart(chart2, {
            type: 'line',
            data: {
                labels: ['Janvier', 'Février', 'Mars', 'Avril', 'Mai'],
                datasets: [{
                    label: 'Données',
                    data: [10, 20, 30, 40, 50],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
