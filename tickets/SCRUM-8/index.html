<!DOCTYPE html>
<html>
<head>
  <title>Analytics Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .dashboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .chart {
      width: 500px;
      height: 300px;
      border: 1px solid #ccc;
      margin: 20px;
    }
    .chart svg {
      width: 100%;
      height: 100%;
    }
    .statistics {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .statistic {
      margin: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      width: 200px;
      text-align: center;
    }
    button {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>Analytics Dashboard</h1>
    <div class="chart">
      <svg>
        <circle cx="250" cy="150" r="100" fill="#4CAF50" />
        <circle cx="250" cy="150" r="50" fill="#fff" />
        <text x="250" y="160" font-size="24" text-anchor="middle">50%</text>
      </svg>
    </div>
    <div class="statistics">
      <div class="statistic">
        <h2>Visitors</h2>
        <p>1000</p>
      </div>
      <div class="statistic">
        <h2>Page Views</h2>
        <p>5000</p>
      </div>
      <div class="statistic">
        <h2>Bounce Rate</h2>
        <p>20%</p>
      </div>
    </div>
    <button id="update-button">Update Statistics</button>
  </div>
  <script>
    document.getElementById('update-button').addEventListener('click', function() {
      var visitors = Math.floor(Math.random() * 1000);
      var pageViews = Math.floor(Math.random() * 5000);
      var bounceRate = Math.floor(Math.random() * 100);
      document.querySelectorAll('.statistic p').forEach(function(p, index) {
        if (index === 0) {
          p.textContent = visitors;
        } else if (index === 1) {
          p.textContent = pageViews;
        } else {
          p.textContent = bounceRate + '%';
        }
      });
    });
  </script>
</html>
