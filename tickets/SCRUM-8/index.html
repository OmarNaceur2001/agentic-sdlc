<!DOCTYPE html>
<html>
<head>
  <title>Tableau de bord d'analyse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .container {
      width: 80%;
      margin: 40px auto;
    }
    .chart {
      width: 100%;
      height: 200px;
      border: 1px solid #ccc;
    }
    .chart svg {
      width: 100%;
      height: 100%;
    }
    .statistics {
      margin-top: 20px;
    }
    .statistics ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .statistics li {
      margin-bottom: 10px;
    }
    button {
      background-color: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tableau de bord d'analyse</h1>
    <div class="chart">
      <svg>
        <rect x="10" y="10" width="100" height="50" fill="#ccc" />
        <rect x="120" y="10" width="100" height="100" fill="#ccc" />
        <rect x="230" y="10" width="100" height="150" fill="#ccc" />
      </svg>
    </div>
    <div class="statistics">
      <h2>Statistiques</h2>
      <ul>
        <li>Nombre de visites : 1000</li>
        <li>Nombre de pages vues : 5000</li>
        <li>Temps de chargement moyen : 2s</li>
      </ul>
    </div>
    <button id="update-button">Mettre à jour les statistiques</button>
    <button id="reset-button">Réinitialiser les statistiques</button>
  </div>
  <script>
    document.getElementById("update-button").addEventListener("click", function() {
      document.querySelector(".statistics ul").innerHTML = `
        <li>Nombre de visites : 1200</li>
        <li>Nombre de pages vues : 6000</li>
        <li>Temps de chargement moyen : 1.5s</li>
      `;
    });
    document.getElementById("reset-button").addEventListener("click", function() {
      document.querySelector(".statistics ul").innerHTML = `
        <li>Nombre de visites : 1000</li>
        <li>Nombre de pages vues : 5000</li>
        <li>Temps de chargement moyen : 2s</li>
      `;
    });
  </script>
</html>
