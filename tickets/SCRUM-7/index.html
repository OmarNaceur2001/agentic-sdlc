<!DOCTYPE html>
<html>
<head>
  <title>Formulaire de contact</title>
  <style>
    body {
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background-color: #2e2e3e;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .container h2 {
      color: #fff;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #fff;
      margin-bottom: 10px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #3e3e4e;
      color: #fff;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      background-color: #4e4e5e;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #5e5e6e;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #6e6e7e;
    }
    .error {
      color: #ff0000;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Formulaire de contact</h2>
    <form id="contact-form">
      <div class="form-group">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" required>
        <div class="error" id="name-error"></div>
      </div>
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" required>
        <div class="error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
        <div class="error" id="message-error"></div>
      </div>
      <button class="btn" type="submit">Envoyer</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('contact-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const nameError = document.getElementById('name-error');
      const emailError = document.getElementById('email-error');
      const messageError = document.getElementById('message-error');
      nameError.textContent = '';
      emailError.textContent = '';
      messageError.textContent = '';
      if (name === '') {
        nameError.textContent = 'Veuillez entrer votre nom';
      }
      if (email === '') {
        emailError.textContent = 'Veuillez entrer votre adresse e-mail';
      } else if (!email.includes('@')) {
        emailError.textContent = 'Veuillez entrer une adresse e-mail valide';
      }
      if (message === '') {
        messageError.textContent = 'Veuillez entrer un message';
      }
      if (name !== '' && email !== '' && message !== '' && email.includes('@')) {
        alert('Formulaire envoyé avec succès');
        form.reset();
      }
    });
  </script>
</html>
