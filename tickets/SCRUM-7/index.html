<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a contact form</title>
    <style>
        body {
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 50%;
            margin: 40px auto;
            background-color: #2f2f3f;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .container h2 {
            color: #fff;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #3f3f4f;
            color: #fff;
        }
        .form-group input:focus, .form-group textarea:focus {
            background-color: #4f4f5f;
        }
        .btn {
            background-color: #ff69b4;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #ff99cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Contact Form</h2>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button class="btn" type="submit">Envoyer</button>
        </form>
        <div id="message-envoye" style="display: none; color: #fff; text-align: center; margin-top: 20px;"></div>
    </div>
    <script>
        const form = document.getElementById('contact-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const messageEnvoye = document.getElementById('message-envoye');
            messageEnvoye.style.display = 'block';
            messageEnvoye.innerText = 'Message envoyé avec succès !';
            form.reset();
            setTimeout(() => {
                messageEnvoye.style.display = 'none';
            }, 3000);
        });
    </script>
</html>
