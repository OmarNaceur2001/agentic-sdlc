<!DOCTYPE html>
<html>
<head>
  <title>Dashboard de salaire</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    #recherche {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Dashboard de salaire</h1>
  <input type="text" id="recherche" placeholder="Rechercher un client">
  <table id="tableau">
    <thead>
      <tr>
        <th>Nom du client</th>
        <th>Salaire</th>
      </tr>
    </thead>
    <tbody id="donnees">
      <tr>
        <td>Jean Dupont</td>
        <td>50000</td>
      </tr>
      <tr>
        <td>Pierre Durand</td>
        <td>60000</td>
      </tr>
      <tr>
        <td>Marie Martin</td>
        <td>40000</td>
      </tr>
      <tr>
        <td>Thomas Leroy</td>
        <td>70000</td>
      </tr>
      <tr>
        <td>Sophie Garnier</td>
        <td>55000</td>
      </tr>
    </tbody>
  </table>
  <button id="ajouter">Ajouter un client</button>
  <script>
    const recherche = document.getElementById('recherche');
    const tableau = document.getElementById('tableau');
    const donnees = document.getElementById('donnees');
    const ajouter = document.getElementById('ajouter');

    recherche.addEventListener('input', function() {
      const valeur = recherche.value.toLowerCase();
      const lignes = donnees.getElementsByTagName('tr');
      for (let i = 0; i < lignes.length; i++) {
        const nom = lignes[i].getElementsByTagName('td')[0].textContent.toLowerCase();
        if (nom.indexOf(valeur) === -1) {
          lignes[i].style.display = 'none';
        } else {
          lignes[i].style.display = '';
        }
      }
    });

    ajouter.addEventListener('click', function() {
      const nom = prompt('Entrez le nom du client');
      const salaire = prompt('Entrez le salaire du client');
      if (nom && salaire) {
        const ligne = document.createElement('tr');
        const nomCell = document.createElement('td');
        const salaireCell = document.createElement('td');
        nomCell.textContent = nom;
        salaireCell.textContent = salaire;
        ligne.appendChild(nomCell);
        ligne.appendChild(salaireCell);
        donnees.appendChild(ligne);
      }
    });
  </script>
</html>
