<!DOCTYPE html>
<html>
<head>
  <title>Dashboard de salaire</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    #recherche {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Dashboard de salaire</h1>
  <input type="text" id="recherche" placeholder="Rechercher un client...">
  <button id="filtrer">Filtrer</button>
  <table id="tableau">
    <thead>
      <tr>
        <th>Nom du client</th>
        <th>Salaire</th>
      </tr>
    </thead>
    <tbody id="contenu">
      <tr>
        <td>Jean Dupont</td>
        <td>50000</td>
      </tr>
      <tr>
        <td>Pierre Durand</td>
        <td>60000</td>
      </tr>
      <tr>
        <td>Marie Martin</td>
        <td>40000</td>
      </tr>
      <tr>
        <td>Lucas Leroy</td>
        <td>70000</td>
      </tr>
    </tbody>
  </table>
  <script>
    const recherche = document.getElementById('recherche');
    const filtrer = document.getElementById('filtrer');
    const contenu = document.getElementById('contenu');
    const tableau = document.getElementById('tableau');
    let donnees = [
      { nom: 'Jean Dupont', salaire: 50000 },
      { nom: 'Pierre Durand', salaire: 60000 },
      { nom: 'Marie Martin', salaire: 40000 },
      { nom: 'Lucas Leroy', salaire: 70000 }
    ];
    filtrer.addEventListener('click', () => {
      const valeurRecherche = recherche.value.toLowerCase();
      const lignes = contenu.getElementsByTagName('tr');
      for (let i = 0; i < lignes.length; i++) {
        const ligne = lignes[i];
        const nom = ligne.getElementsByTagName('td')[0].textContent.toLowerCase();
        if (nom.includes(valeurRecherche)) {
          ligne.style.display = '';
        } else {
          ligne.style.display = 'none';
        }
      }
    });
  </script>
</html>
