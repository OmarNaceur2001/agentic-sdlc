<!DOCTYPE html>
<html>
<head>
  <title>Dashboard de salaire</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    #recherche {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
    #recherche-btn {
      background-color: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #recherche-btn:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <h1>Dashboard de salaire</h1>
  <input type="text" id="recherche" placeholder="Rechercher un client...">
  <button id="recherche-btn">Rechercher</button>
  <table id="tableau">
    <thead>
      <tr>
        <th>Nom du client</th>
        <th>Salaire</th>
      </tr>
    </thead>
    <tbody id="tableau-body">
      <tr>
        <td>Jean Dupont</td>
        <td>50000</td>
      </tr>
      <tr>
        <td>Pierre Durand</td>
        <td>60000</td>
      </tr>
      <tr>
        <td>Marie Martin</td>
        <td>40000</td>
      </tr>
      <tr>
        <td>Thomas Leroy</td>
        <td>70000</td>
      </tr>
      <tr>
        <td>Sophie Laurent</td>
        <td>55000</td>
      </tr>
    </tbody>
  </table>
  <script>
    const rechercheInput = document.getElementById('recherche');
    const rechercheBtn = document.getElementById('recherche-btn');
    const tableauBody = document.getElementById('tableau-body');
    let clients = [
      { nom: 'Jean Dupont', salaire: 50000 },
      { nom: 'Pierre Durand', salaire: 60000 },
      { nom: 'Marie Martin', salaire: 40000 },
      { nom: 'Thomas Leroy', salaire: 70000 },
      { nom: 'Sophie Laurent', salaire: 55000 }
    ];
    rechercheBtn.addEventListener('click', () => {
      const recherche = rechercheInput.value.toLowerCase();
      const resultats = clients.filter(client => client.nom.toLowerCase().includes(recherche));
      tableauBody.innerHTML = '';
      resultats.forEach(client => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${client.nom}</td>
          <td>${client.salaire}</td>
        `;
        tableauBody.appendChild(row);
      });
    });
  </script>
</html>
