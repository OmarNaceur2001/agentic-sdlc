<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a login page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
        }
        .container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: #2f2f3f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .container h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        .container form {
            margin-top: 20px;
        }
        .container label {
            display: block;
            margin-bottom: 10px;
        }
        .container input[type="email"], .container input[type="password"] {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #3f3f4f;
            color: #fff;
        }
        .container input[type="submit"] {
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .erreur {
            color: #f44336;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connexion</h1>
        <form id="form-connexion">
            <label for="email">Adresse e-mail</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>
            <div class="erreur" id="erreur"></div>
            <input type="submit" value="Se connecter">
        </form>
    </div>
    <script>
        const form = document.getElementById('form-connexion');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const erreur = document.getElementById('erreur');
            if (email === '' || password === '') {
                erreur.textContent = 'Veuillez remplir tous les champs';
            } else {
                // Ici vous pouvez ajouter votre logique de connexion
                // Pour cet exemple, nous allons simplement afficher un message de connexion réussie
                erreur.textContent = '';
                alert('Connexion réussie !');
            }
        });
    </script>
</html>
