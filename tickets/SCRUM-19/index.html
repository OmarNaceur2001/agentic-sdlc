<!DOCTYPE html>
<html>
<head>
	<title>Test ticket</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f0f0f0;
		}
		.container {
			width: 80%;
			margin: 40px auto;
			background-color: #fff;
			padding: 20px;
			border: 1px solid #ddd;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0,0,0,0.1);
		}
		.button {
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		.button:hover {
			background-color: #3e8e41;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Test ticket</h1>
		<p>Description : Test depuis curl</p>
		<button class="button" onclick="testFunction()">Tester</button>
		<p id="result"></p>
	</div>
	<script>
		function testFunction() {
			var result = document.getElementById("result");
			result.innerHTML = "Test réussi !";
		}
	</script>
</html>
