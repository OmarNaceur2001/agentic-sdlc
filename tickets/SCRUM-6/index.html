<!DOCTYPE html>
<html>
<head>
  <title>Calculatrice</title>
  <style>
    body {
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    .container {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      background-color: #2e2e3e;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .input-field {
      width: 100%;
      height: 40px;
      margin-bottom: 20px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #3e3e4e;
      color: #fff;
    }
    .button {
      width: 100%;
      height: 40px;
      margin-bottom: 20px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #4e4e5e;
      color: #fff;
      cursor: pointer;
    }
    .button:hover {
      background-color: #5e5e6e;
    }
    .result {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Calculatrice</h2>
    <input type="number" id="num1" class="input-field" placeholder="Nombre 1">
    <input type="number" id="num2" class="input-field" placeholder="Nombre 2">
    <select id="operation" class="input-field">
      <option value="add">Addition</option>
      <option value="subtract">Soustraction</option>
      <option value="multiply">Multiplication</option>
      <option value="divide">Division</option>
    </select>
    <button class="button" onclick="calculate()">Calculer</button>
    <p class="result" id="result"></p>
  </div>
  <script>
    function calculate() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      var operation = document.getElementById("operation").value;
      var result;
      
      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerHTML = "Veuillez entrer des nombres valides";
        return;
      }
      
      switch (operation) {
        case "add":
          result = num1 + num2;
          break;
        case "subtract":
          result = num1 - num2;
          break;
        case "multiply":
          result = num1 * num2;
          break;
        case "divide":
          if (num2 === 0) {
            document.getElementById("result").innerHTML = "Erreur : division par zéro";
            return;
          }
          result = num1 / num2;
          break;
        default:
          document.getElementById("result").innerHTML = "Erreur : opération non valide";
          return;
      }
      
      document.getElementById("result").innerHTML = "Résultat : " + result;
    }
  </script>
</html>
