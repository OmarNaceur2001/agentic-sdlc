<!DOCTYPE html>
<html>
<head>
  <title>Calculatrice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #calculatrice {
      width: 200px;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    #calculatrice input {
      width: 100%;
      height: 30px;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #ccc;
    }
    #calculatrice button {
      width: 100%;
      height: 30px;
      margin-bottom: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: #fff;
      cursor: pointer;
    }
    #calculatrice button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div id="calculatrice">
    <input type="number" id="num1" placeholder="Nombre 1">
    <input type="number" id="num2" placeholder="Nombre 2">
    <button id="add">Additionner</button>
    <button id="subtract">Soustraire</button>
    <button id="multiply">Multiplier</button>
    <button id="divide">Diviser</button>
    <p id="resultat"></p>
  </div>
  <script>
    const num1 = document.getElementById('num1');
    const num2 = document.getElementById('num2');
    const add = document.getElementById('add');
    const subtract = document.getElementById('subtract');
    const multiply = document.getElementById('multiply');
    const divide = document.getElementById('divide');
    const resultat = document.getElementById('resultat');

    add.addEventListener('click', () => {
      const n1 = parseFloat(num1.value);
      const n2 = parseFloat(num2.value);
      const res = n1 + n2;
      resultat.textContent = `Résultat : ${res}`;
    });

    subtract.addEventListener('click', () => {
      const n1 = parseFloat(num1.value);
      const n2 = parseFloat(num2.value);
      const res = n1 - n2;
      resultat.textContent = `Résultat : ${res}`;
    });

    multiply.addEventListener('click', () => {
      const n1 = parseFloat(num1.value);
      const n2 = parseFloat(num2.value);
      const res = n1 * n2;
      resultat.textContent = `Résultat : ${res}`;
    });

    divide.addEventListener('click', () => {
      const n1 = parseFloat(num1.value);
      const n2 = parseFloat(num2.value);
      if (n2 !== 0) {
        const res = n1 / n2;
        resultat.textContent = `Résultat : ${res}`;
      } else {
        resultat.textContent = 'Erreur : Division par zéro';
      }
    });
  </script>
</html>
