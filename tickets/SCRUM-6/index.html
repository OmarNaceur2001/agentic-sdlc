<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a calculator page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
        }
        .calculator {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: #2f2f3f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .display {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #3f3f4f;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            text-align: right;
            color: #fff;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
        }
        .button {
            padding: 10px;
            background-color: #4f4f5f;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            color: #fff;
        }
        .button:hover {
            background-color: #5f5f6f;
        }
        .button:active {
            background-color: #6f6f7f;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" disabled>
        <div class="buttons">
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button" onclick="deleteLastChar()">DEL</button>
            <button class="button" onclick="calculate('%')">%</button>
            <button class="button" onclick="calculate('/')">/</button>
            <button class="button" onclick="calculate('7')">7</button>
            <button class="button" onclick="calculate('8')">8</button>
            <button class="button" onclick="calculate('9')">9</button>
            <button class="button" onclick="calculate('*')">*</button>
            <button class="button" onclick="calculate('4')">4</button>
            <button class="button" onclick="calculate('5')">5</button>
            <button class="button" onclick="calculate('6')">6</button>
            <button class="button" onclick="calculate('-')">-</button>
            <button class="button" onclick="calculate('1')">1</button>
            <button class="button" onclick="calculate('2')">2</button>
            <button class="button" onclick="calculate('3')">3</button>
            <button class="button" onclick="calculate('+')">+</button>
            <button class="button" onclick="calculate('0')">0</button>
            <button class="button" onclick="calculate('.')">.</button>
            <button class="button" onclick="calculate('=')">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let calculation = '';
        function calculate(char) {
            if (char === '=') {
                try {
                    display.value = eval(calculation);
                    calculation = display.value;
                } catch (e) {
                    display.value = 'Erreur';
                    calculation = '';
                }
            } else if (char === 'C') {
                display.value = '';
                calculation = '';
            } else if (char === 'DEL') {
                calculation = calculation.slice(0, -1);
                display.value = calculation;
            } else {
                calculation += char;
                display.value = calculation;
            }
        }
        function clearDisplay() {
            display.value = '';
            calculation = '';
        }
        function deleteLastChar() {
            calculation = calculation.slice(0, -1);
            display.value = calculation;
        }
    </script>
</html>
