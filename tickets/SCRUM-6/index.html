<!DOCTYPE html>
<html>
<head>
  <title>Calculatrice</title>
  <style>
    body {
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    .container {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      background-color: #2e2e3e;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .input-field {
      width: 100%;
      height: 40px;
      margin-bottom: 20px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #3e3e4e;
      color: #fff;
    }
    .button {
      width: 100%;
      height: 40px;
      margin-bottom: 20px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #4e4e5e;
      color: #fff;
      cursor: pointer;
    }
    .button:hover {
      background-color: #5e5e6e;
    }
    .result {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Calculatrice</h2>
    <input type="number" id="num1" class="input-field" placeholder="Nombre 1">
    <input type="number" id="num2" class="input-field" placeholder="Nombre 2">
    <select id="operation" class="input-field">
      <option value="add">Addition</option>
      <option value="subtract">Soustraction</option>
      <option value="multiply">Multiplication</option>
      <option value="divide">Division</option>
    </select>
    <button class="button" id="calculate">Calculer</button>
    <p class="result" id="result"></p>
  </div>
  <script>
    const num1 = document.getElementById('num1');
    const num2 = document.getElementById('num2');
    const operation = document.getElementById('operation');
    const calculate = document.getElementById('calculate');
    const result = document.getElementById('result');

    calculate.addEventListener('click', () => {
      const num1Value = parseFloat(num1.value);
      const num2Value = parseFloat(num2.value);
      const operationValue = operation.value;

      if (isNaN(num1Value) || isNaN(num2Value)) {
        result.textContent = 'Veuillez entrer des nombres valides';
        return;
      }

      let resultValue;
      switch (operationValue) {
        case 'add':
          resultValue = num1Value + num2Value;
          break;
        case 'subtract':
          resultValue = num1Value - num2Value;
          break;
        case 'multiply':
          resultValue = num1Value * num2Value;
          break;
        case 'divide':
          if (num2Value === 0) {
            result.textContent = 'Erreur : division par zéro';
            return;
          }
          resultValue = num1Value / num2Value;
          break;
        default:
          result.textContent = 'Erreur : opération non valide';
          return;
      }

      result.textContent = `Résultat : ${resultValue}`;
    });
  </script>
</html>
